apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fluid-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 842833233822.dkr.ecr.ap-south-1.amazonaws.com/fluid-ai-backend:7
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: rds-secret
          readinessProbe:
            httpGet:
              path: /wrong-health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /wrong-health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20